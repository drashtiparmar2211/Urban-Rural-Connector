{% extends "base.html" %}
{% block content %}
<div class="container" style="max-width: 500px; margin-top: 100px;">
    <div class="card" style="padding: 40px; border-radius: 20px;">
        <h2 style="text-align: center; color: var(--primary-green);">Reset Password</h2>
        <p style="text-align: center; color: #666;">Enter your email to receive a reset link.</p>
        <form method="POST" action="">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="yourname@example.com" required>
            </div>
            <button type="submit" class="btn-primary" style="width: 100%; margin-top: 20px; border: none; padding: 12px;">Send Reset Link</button>
        </form>
    </div>
</div>
{% endblock %}
