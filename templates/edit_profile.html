{% extends "base.html" %}
{% block content %}
<div class="edit-container" style="max-width: 500px; margin: 50px auto; padding: 20px; background: #fff; border-radius: 10px;">
    <h2>Update Your Details</h2>
    <form method="POST">
        <div style="margin-bottom: 15px;">
            <label>Full Name</label><br>
            <input type="text" name="name" value="{{ user.name }}" style="width: 100%; padding: 8px;" required>
        </div>

        <div style="margin-bottom: 15px;">
            <label>Phone Number</label><br>
            <input type="text" name="phone" value="{{ user.phone }}" style="width: 100%; padding: 8px;" required>
        </div>

        <div style="margin-bottom: 15px;">
            <label>State</label><br>
            <input type="text" name="location" value="{{ user.location }}" style="width: 100%; padding: 8px;" required>
        </div>

        {% if user.role == 'rural' %}
        <div style="margin-bottom: 15px;">
            <label>Village Name</label><br>
            <input type="text" name="village" value="{{ user.village }}" style="width: 100%; padding: 8px;">
        </div>
        {% else %}
        <div style="margin-bottom: 15px;">
            <label>City Name</label><br>
            <input type="text" name="city" value="{{ user.city }}" style="width: 100%; padding: 8px;">
        </div>
        {% endif %}

        <div style="margin-bottom: 15px;">
            <label>Full Address</label><br>
            <textarea name="address" style="width: 100%; padding: 8px; height: 80px;">{{ user.address }}</textarea>
        </div>

        <button type="submit" style="background: #27ae60; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px;">Save Changes</button>
        <a href="{{ url_for('profile') }}" style="margin-left: 10px; color: #7f8c8d;">Cancel</a>
    </form>
</div>
{% endblock %}
